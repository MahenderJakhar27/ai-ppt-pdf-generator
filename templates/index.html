<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    height: 100vh;
    transition: all 0.3s ease;
}

/* THEMES */
body.dark { background: #0f172a; color: white; }
body.light { background: #f1f5f9; color: #0f172a; }
body.purple { background: #2e1065; color: white; }
body.green { background: #022c22; color: white; }

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #020617;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.new-chat-btn {
    background: #4f46e5;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    margin-bottom: 15px;
}

.chat-history {
    flex: 1;
    overflow-y: auto;
}

.chat-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 5px;
}

.chat-item:hover {
    background: #1e293b;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    padding: 15px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    position: relative;
}

/* THEME BUTTON */
.theme-btn {
    position: absolute;
    right: 15px;
    top: 10px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

/* Chat */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    max-width: 70%;
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
}

.user {
    background: #4f46e5;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.08);
}

/* Input */
.input-area {
    display: flex;
    padding: 15px;
    background: #020617;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.generate {
    background: #4f46e5;
    color: white;
}

/* Theme dropdown */
.theme-menu {
    position: absolute;
    right: 15px;
    top: 40px;
    background: white;
    color: black;
    border-radius: 8px;
    display: none;
    flex-direction: column;
    overflow: hidden;
}

.theme-menu div {
    padding: 8px;
    cursor: pointer;
}

.theme-menu div:hover {
    background: #ddd;
}

/* Typing */
.typing { display: flex; gap: 5px; }
.dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: blink 1.4s infinite;
}
@keyframes blink {
    0%,80%,100%{opacity:0;}
    40%{opacity:1;}
}

/* Slide preview */
.slide-card {
    min-width: 260px;
    background: #1e293b;
    border-radius: 10px;
    padding: 10px;
}
</style>

</head>

<body class="dark">

<!-- SIDEBAR -->

<div class="sidebar">
    <div class="new-chat-btn" onclick="createNewChat()">+ New Chat</div>
    <div id="history" class="chat-history"></div>
</div>

<!-- MAIN -->

<div class="main">
    <div class="header">
        🤖 AI Assistant


    <!-- THEME BUTTON -->
    <button class="theme-btn" onclick="toggleThemeMenu()">🎨</button>

    <div id="themeMenu" class="theme-menu">
        <div onclick="setTheme('dark')">Dark</div>
        <div onclick="setTheme('light')">Light</div>
        <div onclick="setTheme('purple')">Purple</div>
        <div onclick="setTheme('green')">Green</div>
    </div>
</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
    <input id="prompt" placeholder="Ask anything or create PPT/PDF..." />
    <button class="generate" onclick="generate()">Send</button>
</div>


</div>

<script>
let chats = {};
let currentChatId = null;
let isLoading = false;

const chatDiv = document.getElementById("chat");
const input = document.getElementById("prompt");
const historyDiv = document.getElementById("history");

/* INIT */
createNewChat();

/* ENTER KEY */
input.addEventListener("keypress", e => {
    if (e.key === "Enter") generate();
});

/* THEME */
function toggleThemeMenu() {
    const menu = document.getElementById("themeMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function setTheme(theme) {
    document.body.className = theme;
    document.getElementById("themeMenu").style.display = "none";
}

/* NEW CHAT */
function createNewChat() {
    const id = Date.now();
    chats[id] = [];
    currentChatId = id;

    chatDiv.innerHTML = "";
    addMessage("👋 New chat started!", "bot");

    updateSidebar();
}

/* ADD MESSAGE */
function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = text;
    chatDiv.appendChild(msg);

    chats[currentChatId].push({
        role: type === "user" ? "user" : "assistant",
        content: text
    });

    chatDiv.scrollTop = chatDiv.scrollHeight;
}

/* TYPING */
function showTyping() {
    const t = document.createElement("div");
    t.id = "typing";
    t.className = "message bot typing";
    t.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    chatDiv.appendChild(t);
}
function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

/* RENDER SLIDES */
function renderSlides(data, prompt) {
    let html = `<b>${data.title}</b><br><br><div style="display:flex;gap:10px;overflow:auto;">`;

    data.slides.forEach((s,i)=>{
        html += `
        <div class="slide-card">
            <small>Slide ${i+1}</small>
            <b>${s.heading}</b>
            <ul>${s.points.map(p=>`<li>${p}</li>`).join("")}</ul>
        </div>`;
    });

    html += `</div>
    <div style="margin-top:10px;">
        <button onclick="downloadFile('ppt','${prompt}')">Download PPT</button>
        <button onclick="downloadFile('pdf','${prompt}')">Download PDF</button>
    </div>`;

    return html;
}

/* MAIN LOGIC */
async function generate() {
    if (isLoading) return;

    const prompt = input.value.trim();
    if (!prompt) return;

    isLoading = true;

    addMessage(prompt, "user");
    input.value = "";

    showTyping();

    try {
        const lower = prompt.toLowerCase();
        const isGen = lower.includes("ppt") || lower.includes("pdf") || lower.includes("presentation");

        let res, data;

        if (isGen) {
            res = await fetch(`/preview?prompt=${encodeURIComponent(prompt)}`);
            data = await res.json();

            removeTyping();
            addMessage(renderSlides(data, prompt), "bot");

        } else {
            res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ history: chats[currentChatId] })
            });

            data = await res.json();

            removeTyping();
            addMessage(data.response, "bot");
        }

    } catch (err) {
        removeTyping();
        addMessage("❌ Something went wrong.", "bot");
    }

    isLoading = false;
    updateSidebar();
}

/* DOWNLOAD */
async function downloadFile(type, prompt) {
    const res = await fetch(`/generate-${type}?prompt=${encodeURIComponent(prompt)}`);
    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = type === "ppt" ? "presentation.pptx" : "document.pdf";
    a.click();
}

/* SIDEBAR */
function updateSidebar() {
    historyDiv.innerHTML = "";

    Object.keys(chats).reverse().forEach(id => {
        const item = document.createElement("div");
        item.className = "chat-item";

        const firstMsg = chats[id][0]?.content || "New Chat";
        item.innerText = firstMsg.substring(0, 25);

        item.onclick = () => loadChat(id);

        historyDiv.appendChild(item);
    });
}

/* LOAD CHAT */
function loadChat(id) {
    currentChatId = id;
    chatDiv.innerHTML = "";

    chats[id].forEach(msg => {
        const type = msg.role === "user" ? "user" : "bot";
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = msg.content;
        chatDiv.appendChild(div);
    });
}
</script>

</body>
</html>
