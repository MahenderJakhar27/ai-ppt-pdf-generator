<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Presentation Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    padding: 15px;
    text-align: center;
    font-weight: bold;
    background: rgba(255,255,255,0.05);
    position: relative;
}

/* New Chat Button */
.new-chat {
    position: absolute;
    left: 15px;
    top: 10px;
    background: #4f46e5;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* Chat */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    max-width: 70%;
    padding: 14px;
    margin: 10px;
    border-radius: 14px;
}

.user {
    background: #4f46e5;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.08);
    align-self: flex-start;
}

/* Input */
.input-area {
    display: flex;
    padding: 15px;
    background: #020617;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}

.generate {
    background: #4f46e5;
    color: white;
}

/* Slide */
.slide {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
}

/* Typing */
.typing {
    display: flex;
    gap: 5px;
}
.dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: blink 1.4s infinite;
}
@keyframes blink {
    0%,80%,100%{opacity:0;}
    40%{opacity:1;}
}
</style>

</head>

<body>

<div class="header">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    🤖 AI Presentation Assistant By MJ
</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
    <input id="prompt" placeholder="Ask anything or create PPT/PDF..." />
    <button class="generate" onclick="generate()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("prompt");

let isLoading = false;
let chatHistory = []; // 🔥 MEMORY

window.onload = () => {
    addMessage("👋 Hi! I'm your AI assistant.<br>Ask me anything or create PPT/PDF.", "bot");
};

/* ENTER KEY */
input.addEventListener("keypress", e => {
    if (e.key === "Enter") generate();
});

/* NEW CHAT */
function newChat() {
    chat.innerHTML = "";
    chatHistory = [];
    addMessage("👋 New chat started!", "bot");
}

/* ADD MESSAGE */
function addMessage(html, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = html;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

/* TYPING */
function showTyping() {
    const t = document.createElement("div");
    t.id = "typing";
    t.className = "message bot typing";
    t.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    chat.appendChild(t);
}
function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

/* RENDER SLIDES */
function renderSlides(data, prompt) {
    let html = `<b>${data.title}</b><br><br><div style="display:flex;gap:10px;overflow:auto;">`;

    data.slides.forEach((s,i)=>{
        html += `
        <div style="min-width:250px;background:#0f172a;padding:10px;border-radius:10px;">
            <small>Slide ${i+1}</small>
            <b>${s.heading}</b>
            <ul>${s.points.map(p=>`<li>${p}</li>`).join("")}</ul>
        </div>`;
    });

    html += `</div>
    <div>
        <button onclick="downloadFile('ppt','${prompt}')">Download PPT</button>
        <button onclick="downloadFile('pdf','${prompt}')">Download PDF</button>
    </div>`;

    return html;
}

/* MAIN LOGIC 🔥 */
async function generate() {
    if (isLoading) return;

    const prompt = input.value.trim();
    if (!prompt) return;

    isLoading = true;

    addMessage(prompt, "user");
    chatHistory.push({ role: "user", content: prompt });

    input.value = "";
    showTyping();

    try {
        const lower = prompt.toLowerCase();

        const isPPT = lower.includes("ppt") || lower.includes("presentation");
        const isPDF = lower.includes("pdf") || lower.includes("report");

        let res, data;

        if (isPPT || isPDF) {
            res = await fetch(`/preview?prompt=${encodeURIComponent(prompt)}`);
            data = await res.json();

            removeTyping();
            addMessage(renderSlides(data, prompt), "bot");

            chatHistory.push({ role: "assistant", content: "Generated content" });

        } else {
            res = await fetch(`/chat`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ history: chatHistory })
            });

            data = await res.json();

            removeTyping();
            addMessage(data.response, "bot");

            chatHistory.push({ role: "assistant", content: data.response });
        }

    } catch {
        removeTyping();
        addMessage("❌ Error occurred", "bot");
    }

    isLoading = false;
}

/* DOWNLOAD */
async function downloadFile(type, prompt) {
    const res = await fetch(`/generate-${type}?prompt=${encodeURIComponent(prompt)}`);
    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = type === "ppt" ? "presentation.pptx" : "document.pdf";
    a.click();
}
</script>

</body>
</html>
