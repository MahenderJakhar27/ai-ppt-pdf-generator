<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Presentation Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    padding: 15px;
    text-align: center;
    font-weight: bold;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

/* Chat */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    max-width: 70%;
    padding: 14px;
    margin: 10px;
    border-radius: 14px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease-in;
}

.user {
    background: #4f46e5;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    align-self: flex-start;
}

/* Input */
.input-area {
    display: flex;
    padding: 15px;
    background: #020617;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.generate {
    background: #4f46e5;
    color: white;
}

.generate:hover {
    background: #4338ca;
}

/* Downloads */
.downloads button {
    margin-top: 10px;
    margin-right: 8px;
    background: #16a34a;
}

/* Slide preview card */
.slide {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
}

/* Typing animation */
.typing {
    display: flex;
    gap: 5px;
}

.dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="header">🤖 AI Presentation Assistant By MJ</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
    <input id="prompt" placeholder="What can I help you create today?" />
    <button class="generate" onclick="generate()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("prompt");

let isLoading = false;

/* Welcome */
window.onload = () => {
    addMessage(
        "👋 Hi! I'm your AI assistant.<br><br>What can I help you create today?",
        "bot"
    );
    input.focus();
};

/* ENTER KEY SUPPORT 🔥 */
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        generate();
    }
});

/* THEME */
function toggleTheme() {
    document.body.classList.toggle("light");
}

/* ADD MESSAGE */
function addMessage(html, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = html;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

/* TYPING */
function showTyping() {
    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.id = "typing";

    typing.innerHTML = `
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;

    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

/* SLIDE PREVIEW (IMPROVED UI) */
function renderSlides(data, prompt) {
    let html = `
        <div style="font-weight:bold; margin-bottom:10px;">
            ${data.title}
        </div>

        <div style="
            display:flex;
            gap:15px;
            overflow-x:auto;
        ">
    `;

    data.slides.forEach((slide, index) => {
        html += `
        <div style="
            min-width:260px;
            background:#0f172a;
            border-radius:12px;
            padding:12px;
        ">
            <small style="color:#94a3b8;">Slide ${index + 1}</small>
            <div style="font-weight:bold; margin:5px 0;">
                ${slide.heading}
            </div>
            <ul style="font-size:12px;">
                ${slide.points.map(p => `<li>${p}</li>`).join("")}
            </ul>
        </div>
        `;
    });

    html += `</div>`;

    html += `
    <div class="downloads">
        <button onclick="downloadFile('ppt','${prompt}')">Download PPT</button>
        <button onclick="downloadFile('pdf','${prompt}')">Download PDF</button>
    </div>
    `;

    return html;
}

/* GENERATE */
async function generate() {
    if (isLoading) return;

    const prompt = input.value.trim();
    if (!prompt) return;

    isLoading = true;

    addMessage(prompt, "user");
    input.value = "";

    showTyping();

    try {
        const res = await fetch(`/preview?prompt=${encodeURIComponent(prompt)}`);
        const data = await res.json();

        removeTyping();

        const previewHTML = renderSlides(data, prompt);
        addMessage(previewHTML, "bot");

    } catch (err) {
        removeTyping();
        addMessage("❌ Something went wrong. Try again.", "bot");
    }

    isLoading = false;
}

/* DOWNLOAD */
async function downloadFile(type, prompt) {
    const res = await fetch(`/generate-${type}?prompt=${encodeURIComponent(prompt)}`);
    const blob = await res.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = type === "ppt" ? "presentation.pptx" : "document.pdf";
    a.click();
}
</script>
</body>
</html>
