<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI PPT & PDF Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Chat container */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Chat bubbles */
.message {
    max-width: 70%;
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
    line-height: 1.4;
}

.user {
    background: #4f46e5;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    align-self: flex-start;
}

/* Input area */
.input-area {
    display: flex;
    padding: 15px;
    background: #020617;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.generate {
    background: #4f46e5;
    color: white;
}

.downloads {
    margin-top: 10px;
}

.downloads button {
    margin-right: 10px;
    background: #16a34a;
    color: white;
}
</style>
</head>

<body>

<div id="chat" class="chat-container"></div>

<div class="input-area">
    <input id="prompt" placeholder="Ask something like 'AI in Healthcare'" />
    <button class="generate" onclick="generate()">Send</button>
</div>

<script>
function addMessage(html, type) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = html;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function renderSlides(data, prompt) {
    let html = `<b>${data.title}</b><br><br>`;

    data.slides.forEach((slide, index) => {
        html += `
        <div style="
            background:#1e293b;
            padding:12px;
            border-radius:10px;
            margin-bottom:10px;
        ">
            <b>${index + 1}. ${slide.heading}</b>
            <ul>
                ${slide.points.map(p => `<li>${p}</li>`).join("")}
            </ul>
        </div>
        `;
    });

    html += `
    <div class="downloads">
        <button onclick="downloadFile('ppt','${prompt}')">Download PPT</button>
        <button onclick="downloadFile('pdf','${prompt}')">Download PDF</button>
    </div>
    `;

    return html;
}

async function generate() {
    const prompt = document.getElementById("prompt").value;

    if (!prompt) return alert("Enter topic");

    addMessage(prompt, "user");
    addMessage("Generating preview... ⏳", "bot");

    try {
        const res = await fetch(`/preview?prompt=${encodeURIComponent(prompt)}`);
        const data = await res.json();

        const previewHTML = renderSlides(data, prompt);

        addMessage(previewHTML, "bot");

    } catch (err) {
        addMessage("Error generating preview ❌", "bot");
    }
}

async function downloadFile(type, prompt) {
    const res = await fetch(`/generate-${type}?prompt=${encodeURIComponent(prompt)}`);
    const blob = await res.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = type === "ppt" ? "presentation.pptx" : "document.pdf";
    a.click();
}
</script>
</body>
</html>
