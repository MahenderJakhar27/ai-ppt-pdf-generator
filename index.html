<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI PPT & PDF Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #cbd5f5;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;
            outline: none;
            font-size: 14px;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .ppt {
            background: #4f46e5;
            color: white;
        }

        .ppt:hover {
            background: #4338ca;
        }

        .pdf {
            background: #16a34a;
            color: white;
        }

        .pdf:hover {
            background: #15803d;
        }

        .loading {
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Generator 🚀</h1>
    <p>Create PPT & PDF using AI instantly</p>

    <input type="text" id="prompt" placeholder="Enter topic (e.g. AI in Healthcare)" />

    <div class="buttons">
        <button class="ppt" onclick="downloadFile('ppt')">Download PPT</button>
        <button class="pdf" onclick="downloadFile('pdf')">Download PDF</button>
    </div>

    <div class="loading" id="loading">Generating... please wait ⏳</div>
</div>

<script>
    async function downloadFile(type) {
        const prompt = document.getElementById("prompt").value;

        if (!prompt) {
            alert("Please enter a topic");
            return;
        }

        const loading = document.getElementById("loading");
        loading.style.display = "block";

        try {
            const response = await fetch(`http://localhost:8000/generate-${type}?prompt=${encodeURIComponent(prompt)}`);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = type === "ppt" ? "presentation.pptx" : "document.pdf";
            a.click();
        } catch (error) {
            alert("Error generating file");
            console.error(error);
        }

        loading.style.display = "none";
    }
</script>

</body>
</html>
